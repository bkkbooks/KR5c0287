front:
  text: 太極真人九轉還丹經要訣西城王君曰欲合九轉先作神釜可容三斗半者當用滎陽長沙豫章土釜厚四分取東海左顧牡蠣白石脂雲母粉蚓螻糞滑石白礜石凡六物分等各搗二萬杵畢都冶合又共搗三萬杵畢以細絹羅之了又取百日苦酒和之令如泥又搗一萬杵了以泥泥上下土釜內外使厚三分於陰室中乾之了又於微日中更上泥三分乾之十日如前凡三過上泥令內外通厚一寸三分也伺泥乾之取鉛丹和苦酒為泥合搗三萬杵了以泥兩土釜之內而令厚三分又隂乾五日夜又加泥二分隂乾勿令有細坼如絲髮即不可用隨以羊鬚為筆和泥塗縫令密塞之作九轉還丹之神釜畢矣然後當在名山無人跡之處臨東流水上作神竈屋屋長四丈廣二丈起基四尺又當先掘基下土三五尺深如無故塪井冢瘞埋之所然可築基蓋屋開南户東户西户三門也乃立竈於屋中央竈口向西竈窠內須令安得鐡𨭊容坐得土釡竈子四邊令去釜凡九寸以磚并細土泥構立之亦勿令有穿坼也神竈之法畢矣
  hash: sha256:f28351a2a51de5fede84a4082213e116b794b50e77f9a06f5b2aaa95165fbeac
