body:
  text: 用藥法礬石一斤空青三斤如有曾青只用曾白石英二斤丹砂十斤色光明不染紙者展錦州上䧺黃四斤精明赤色不染紙上雌黄五斤水銀六斤凡七物唯汞不擣耳其六般各擣三萬杵了先入礬石著釜下次納空青次納白石英次納丹砂次納䧺黄次納雌黄雌黄獨在上調按令平正迺以水銀六斤灌注雌黃上都畢廼以神釡蓋蓋合之仍先用鉛丹泥泥下釜際上廼安上釜釜際亦先泥縫之使兩釜相合際宻也又以鉛丹泥泥兩際之外稍令厚一寸二分此是用土釜法若以土焼成者甆釜子及金銀鍮銅爲之者量其事而泥之不在一寸二分厚也其泥土釜凡三遍上泥遍遍須泥兩釜際令乾則再上之至一寸二分畢也又以六一泥泥鉛丹泥之外令厚一寸二分如鉛丹泥法漸漸乾迺上泥也共是二寸四分都畢矣然後安在鐵𨭊上閣之鐵𨭊脚四脚如鏊脚状但令髙九寸也先以糠煨火入𨭊下令去釜底六寸九日九夜又加火去釜底三寸九日九夜又加火齊釜底三寸九日九夜又加火上釜腹三寸九日九夜又加火再上釜腹二寸共五寸九日九夜又加火齊釜合際之下一寸九日九夜止寒之十日又加火至釜際之下半寸頓三十六日晝夜凡合九十晝夜名曰九轉還丹日滿寒之七日廼出釜下竈去上釜其飛精九色流光煥爛皆懸著上釜矣以三歳䧺雞羽掃之盛以宻器帶之肘後秤二兩爲劑也平旦向東以新清水餌之即能隠淪散形飛翔太虛太極遣使迎以金丹羽輪分形化景作白鶴數千頭上登太微位爲真仙夀同三光還童却老面生玉映項有曜靈寔九轉還丹之力也取鉛十斤著鐡器中猛火火之令沸投儿轉之華一銖於鉛汁中攪之須臾立成黄金九斤矣取水銀一斤錫七斤著鍋中火之三沸投九轉之華一銖於錫汁中攪之須臾立成白銀也有此變化是丹成耳如試之未可則依上法再燒九十日夜無不成者矣取土釜中丹滓合禱五萬杵合和以白砂蜜丸梧子大名曰太極還命神丸其巳死未三日者開其口投二丸以新水下之皆即活矣其傷敗殘屈目盲耳聾以神丸傅之皆平復如故病在内者餌兩粒病在外者散二丸爲粉以摩傳之即立愈所治隨意任手也旦服一丸夀同天地以神丸塗物出手自還也其故土釜慎勿毁之廼復可以合丹因前泥用之但當更宻塞其上下釜之口勿穢慢之臨用之時更泥内外以鉛丹泥令厚分寸如前法也若火劣而日滿其丹華未飛者火少耳更復固釜口際如法再火之三十六日萬無不成也則不須九十書夜矣當先清齊百日迺泥作神釜成擣藥令計至九月九日平旦發火自齋以始便斷絶人事令待丹成也合丹可同心慕道淳和忠信不淫濫守志行者三人可也若難其人兩人可也皆須齋戒沐浴不得履殗穢見屍也及雞犬大忌之人間難修養者良由兹乎此九轉神丹方王君口訣流利易合作也若藥物盡精好齋戒修整深隠清靜此方神妙無不成也齋起日當先投清酒五斛於所止之流水中若地無流水當好井投酒於中以填地氣也合齋皆飲此水也傅受神經丹訣皆約齋盟誓用金魚八兩玉龍偃鐶以代剪髮㰱血之誓世上如難得此物又不可使靈術永閉也可用青細布四十尺以准金魚之信重帛絹四十尺以齊偃鐶玉龍之約並奉有經之師當營散以施山栖之寒學不得自割以爲身用所以明天約也示無私矣違盟漏泄四極有法祕之慎之黄帝四扇散方當欲修鍊九轉丹餌之者則先餌服此巳下藥巳漸去濁炁世間之疾耳去其穀清其五藏六腑庶成其真也松脂澤㵼山术乾薑雲母乾地黃石上菖蒲桂凡八物精治令分等合擣四萬杵盛以密器中勿令女子六畜諸殗穢者見之旦以酒餌三方七亦可水服之亦可以蜜丸如大豆許旦餌二十丸至三十丸半季則可去濁炁除百病耳然可絶穀餌丹也此黄帝所受風后神方却老還童之道也王母四童散方未餌丹之前先須服此散以盪隂邪之炁存陽炁調和榮衛六府者也胡麻天門冬茯苓术乾黃精桃人去赤皮取白肉也右先熬胡麻令香凡六物精治分等合擣三萬杵旦以酒餌三方七目再服之亦可以水服之亦可用蜜丸旦服三十丸日一耳此返嬰童之祕道者也善填精補臘矣茅君五種芝茸方句曲山上有神芝五種道士有好仙者當得之求之法當以三月九月開日登山齎鐶二雙不限金玉耳啓以奉誓如此者三以爲盟矣必得之投鐶於山石之間勿顧念之仙法貴青鐶之物以効信也第一芝名龍芝似蛟龍之相負也以葉爲鱗其根蟠龍得而食之當爲太極仙卿也第二芝名參成芝赤色有宋光煒煒扣其枝葉如金石之音折而續之即如故得而食之當爲太極大夫第三芝名燕胎芝其色紫形如菜葉上有紫燕象如欲飛狀光明洞徹得食一枝當爲太清龍虎仙君正一郎中矣第四芝名夜光洞草芝其色青其實正白如李子大髙三四寸其葉似栢夜視其實如月光洞照一室一株有九實實墮地時須臾轉大如徑七寸鏡盤著地厚一二寸許夜眎之如牛目動盼以顧人得食一枝當爲太清仙宫左御史矣第五芝名科玉芝剖食其腦當爲三官御史耳此巳上五芝三君所請以種句曲山内外也求仙之士誠能篤志以盡玄心得見上芝也若心不單竭於道德則可見下芝耳求道懈慢者亦不得保其徃也可不慎乎可不慎乎五芝神茸甚有靈異故附之於還丹之末者耳太極真人九轉還丹經要訣
